[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read", path = "./test/fixtures" }]

[invariant]
runs = 64
depth = 128

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
